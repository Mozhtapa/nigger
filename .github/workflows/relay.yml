name: mhr-cfw GitHub Relay

on:
  repository_dispatch:
    types:
      - proxy_request

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install node-fetch@2

      - name: Run relay handler
        env:
          RELAY_AUTH_KEY: ${{ secrets.6584af8acc946bf0d1218e9ea4f2f870742bbd3ff7cd200956c2ac3f2fc555d3 }}
        run: |
          node relay.js << 'EOF'
          ${{ toJson(github.event.client_payload) }}
          EOF
